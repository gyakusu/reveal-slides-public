<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>
      知識は繋がって初めて価値を生む — SharePoint×Obsidianではじめる社内Wiki
    </title>

    <!-- Reveal.js コアスタイル -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/reveal.js@4.6.1/dist/reveal.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/reveal.js@4.6.1/dist/theme/white.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/reveal.js@4.6.1/plugin/highlight/monokai.css"
    />

    <!-- PDF印刷サポート: ?print-pdf をURLに追加すると印刷用レイアウトに切り替わる -->
    <script>
      var link = document.createElement("link");
      link.rel = "stylesheet";
      link.type = "text/css";
      link.href = window.location.search.match(/print-pdf/gi)
        ? "https://cdn.jsdelivr.net/npm/reveal.js@4.6.1/dist/print/pdf.css"
        : "https://cdn.jsdelivr.net/npm/reveal.js@4.6.1/dist/print/paper.css";
      document.head.appendChild(link);
    </script>

    <!-- Google Fonts（Noto Sans JP） -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- プレゼンテーションテーマ（共通テンプレート） -->
    <link rel="stylesheet" href="common/css/presentation-theme.css" />
  </head>

  <body>
    <!-- NSKロゴ（右上固定） -->
    <img src="images/NSK.png" alt="NSK Logo" class="nsk-logo" />

    <!-- カスタムフッター -->
    <div class="reveal-footer">
      <div class="copyright">Copyright NSK Ltd. All Rights Reserved.</div>
      <div class="page-number" id="page-number">1 / 1</div>
    </div>

    <div class="reveal">
      <div class="slides" id="slides-container">
        <!-- スライドは slides.html から動的に読み込まれます -->
      </div>
    </div>

    <!-- Reveal.js コア -->
    <script src="https://cdn.jsdelivr.net/npm/reveal.js@4.6.1/dist/reveal.js"></script>

    <!-- Reveal.js プラグイン -->
    <script src="https://cdn.jsdelivr.net/npm/reveal.js@4.6.1/plugin/notes/notes.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/reveal.js@4.6.1/plugin/highlight/highlight.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/reveal.js@4.6.1/plugin/math/math.js"></script>

    <!-- Mermaid（図表描画） -->
    <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/reveal.js-mermaid-plugin@11.6.0/plugin/mermaid/mermaid.js"></script>

    <!-- 共有初期化モジュール -->
    <script src="common/js/reveal-init.js"></script>
    <script>
      RevealInit.start({
        slides: [
          "slides-01-opening-why.html",
          "slides-02-setup.html",
          "slides-03-metadata.html",
          "slides-04-operations-closing.html",
        ],
      });
    </script>
  </body>
</html>
